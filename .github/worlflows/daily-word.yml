name: Daily English Word

on:
  schedule:
    - cron: "0 0 * * *"   # GitHub 排程用 UTC；UTC 00:00 = 台北時間 08:00
  workflow_dispatch: {}     # 保留手動觸發按鈕，隨時可以測試

permissions:
  contents: write           # 要把 progress.json commit 回 repo，才需要寫入權限

jobs:
  send-word:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: 發送今日單字
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python send_word.py

      - name: 把進度 commit 回 repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add progress.json
          git commit -m "chore: update word progress" || echo "進度沒有變化，跳過 commit"
          git push
